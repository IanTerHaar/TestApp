name: Version & Release

on:
  push:
    branches: [main]

jobs:
  bump-and-release:
    name: Bump Version & Create Release
    runs-on: ubuntu-latest
    # Prevent the workflow from running if the commit was made by your new bot
    if: "!contains(github.triggering_actor, 'versionator-9000')"
    steps:
      # 1. Generate the installation access token for your GitHub App ruleset bypass
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      # 2. Checkout using your ruleset-exempt app token
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Bump version using the Bot's Git identity
      - name: Bump version
        id: bump
        run: |
          git config user.name "versionator-9000[bot]"
          git config user.email "versionator-9000[bot]@users.noreply.github.com"

          MESSAGE="${{ github.event.head_commit.message }}"

          if echo "$MESSAGE" | grep -q "#major"; then
            npm version major -m "chore: bump version to %s"
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$MESSAGE" | grep -q "#minor"; then
            npm version minor -m "chore: bump version to %s"
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          else
            npm version patch -m "chore: bump version to %s"
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

          git push
          if [ "$(cat $GITHUB_OUTPUT | grep bump_type | cut -d'=' -f2)" != "patch" ]; then
            git push --tags
          fi

      # 4. Create GitHub Release using your ruleset-exempt app token
      - name: Create GitHub Release
        if: steps.bump.outputs.bump_type != 'patch'
        run: |
          gh release create v${{ steps.bump.outputs.new_version }} \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --notes "**Bump type:** ${{ steps.bump.outputs.bump_type }}
          **Triggered by:** ${{ github.event.head_commit.message }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
